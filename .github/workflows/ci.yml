on: [push]

name: ci
permissions:
  contents: read

jobs:
  build_and_test:
    name: Build binary, test, and check format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Check code
        run: cargo check

      - name: Check tests
        run: cargo test
      
      - name: Check format
        run: cargo fmt --all -- --check

      - name: Check Clippy
        run: cargo clippy -- -D warnings

  deploy:
    name: Create binaries ${{ matrix.config.target }}
    needs: build_and_test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.config.os }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        config:
          - {
              os: ubuntu-latest,
              target: "x86_64-unknown-linux-gnu"
            }
          - {
              os: windows-latest,
              target: "x86_64-pc-windows-msvc"
            }
          - {
              os: macos-latest,
              target: "x86_64-apple-darwin"
            }
    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.config.target }}

      - name: Build target
        run: cargo build --release --target ${{ matrix.config.target }}

      - name: Get version
        id: get_version
        shell: bash
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -n1 | cut -d '"' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Package all targets
        shell: bash
        if: ${{ !contains(matrix.config.target, 'windows') }}
        run: |
          BIN=primos-adri
          VERSION=${VERSION}
          BIN_NAME=${BIN}-${VERSION}
          TARGET=${{ matrix.config.target }}
          if [[ ${TARGET} == *"windows"* ]]; then
            BIN_NAME=${BIN}-${VERSION}.exe
          fi
          cp target/${TARGET}/release/${BIN} target/${TARGET}/release/${BIN_NAME}
          if [[ ${TARGET} != *"darwin"* ]]; then
            strip target/${TARGET}/release/${BIN_NAME}
          fi
          if [[ ${TARGET} == *"darwin"* ]]; then
            brew install coreutils
          fi
          cd target/${TARGET}/release
          if [[ ${TARGET} != *"windows"* ]]; then
            sha256sum ${BIN_NAME} > digest.sha256
          fi
          zip ../../../${BIN}-${VERSION}-${TARGET}.zip ${BIN_NAME} digest.sha256
          cd -
      - name: Package all targets for Windows
        if: ${{ contains(matrix.config.target, 'windows') }}
        shell: bash
        run: |
          BIN=primos-adri
          VERSION=${VERSION}
          BIN_NAME=${BIN}-${VERSION}.exe
          TARGET=${{ matrix.config.target }}
          cp target/${TARGET}/release/${BIN}.exe target/${TARGET}/release/${BIN_NAME}
          cd target/${TARGET}/release
          sha256sum ${BIN_NAME} > digest.sha256
          tar.exe acvf ../../../${BIN}-${VERSION}-${TARGET}.zip ${BIN_NAME} digest.sha256
          cd -
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: primos-adri-${{ env.VERSION }}-${{ matrix.config.target }}.zip

      - name: Upload packaged artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: release-${{ matrix.config.target }}
          path: primos-adri-${{ env.VERSION }}-${{ matrix.config.target }}.zip
          if-no-files-found: error

  release:
    name: Create immutable release
    needs: deploy
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: release-artifacts
          merge-multiple: true

      - name: Verify packaged artifacts
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(release-artifacts/*.zip)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release artifacts were downloaded"
            exit 1
          fi

      - name: Create immutable release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1 || \
          gh release create "$TAG" release-artifacts/*.zip --repo "$REPO" --verify-tag --generate-notes